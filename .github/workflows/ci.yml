name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types: [published]

jobs:
  verify:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.5'
          cache: true

      - name: Verify dependencies
        run: go mod verify

      - name: Format check
        run: test -z "$(gofmt -l .)"

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build ./...

      - name: Unit and integration tests
        run: go test ./...

      - name: Race tests
        run: go test -race ./...

      - name: Minimal source scope
        run: sh tests/minimal_scope_test.sh

      - name: macOS source installer
        run: make test-open-source-installer
